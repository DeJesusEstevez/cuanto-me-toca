<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="¿Cuánto Me Toca? — Calculadora de prestaciones laborales RD">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#10233A"/>
      <stop offset="1" stop-color="#0A1626"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1010" cy="120" r="360" fill="#148F5B" opacity="0.10"/>
  <circle cx="120" cy="560" r="260" fill="#E88B33" opacity="0.08"/>

  <!-- Texto principal -->
  <g font-family="'Sora','Segoe UI',system-ui,sans-serif">
    <text x="90" y="150" font-size="26" font-weight="700" letter-spacing="2" fill="#7fd8ab">CÓDIGO DE TRABAJO · LEY 16-92</text>
    <text x="86" y="266" font-size="80" font-weight="800" fill="#ffffff">Al salir de tu trabajo,</text>
    <text x="86" y="362" font-size="80" font-weight="800" fill="#ffffff">¿<tspan fill="#41c98a">cuánto te toca</tspan>?</text>
    <text x="90" y="470" font-size="34" font-weight="600" font-family="'Instrument Sans','Segoe UI',sans-serif" fill="#b7c4d3">Preaviso · cesantía · vacaciones · regalía. Gratis y privado.</text>
  </g>

  <!-- Marca / recibo -->
  <g transform="translate(90 520)">
    <rect x="0" y="0" width="52" height="52" rx="12" fill="#148F5B"/>
    <text x="26" y="38" text-anchor="middle" font-family="'Sora',sans-serif" font-weight="800" font-size="26" fill="#06301f">$</text>
    <text x="70" y="36" font-family="'Sora',sans-serif" font-weight="800" font-size="34" fill="#ffffff">¿Cuánto Me Toca?</text>
  </g>

  <!-- Mini recibo decorativo -->
  <g transform="translate(922 208) scale(0.9)">
    <path fill="#ffffff" d="M0 0 h230 a12 12 0 0 1 12 12 v250
      l-19 -14 -19 14 -19 -14 -19 14 -19 -14 -19 14 -19 -14 -19 14 -19 -14 -19 14 -19 -14 -19 14
      v-250 a12 12 0 0 1 12 -12 z"/>
    <g stroke="#DCE4E1" stroke-width="8" stroke-linecap="round" stroke-dasharray="2 20">
      <line x1="28" y1="70" x2="214" y2="70"/>
      <line x1="28" y1="120" x2="214" y2="120"/>
      <line x1="28" y1="170" x2="160" y2="170"/>
    </g>
    <text x="121" y="245" text-anchor="middle" font-family="'Space Mono',monospace" font-weight="700" font-size="40" fill="#148F5B">RD$</text>
  </g>
</svg>
